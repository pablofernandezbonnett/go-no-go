# Example schema for config/companies.yaml

companies:

  - id: example_product_company
    name: Example Product Company

    # Primary job source used by fetch-web.
    career_url: https://example.com/careers/

    # Corporate site used for company context/reputation interpretation.
    corporate_url: https://example.com/

    # Free-form hint used by decision logic context.
    type_hint: saas_product

    # Free-form region hint.
    region: japan

    # Optional: short context note used by deterministic signals.
    notes: "English-friendly product company with hybrid teams."

    # Allowed values:
    # expat_friendly, engineering_brand, strong_wlb,
    # stable_public, product_leader, reputation_strong
    profile_tags:
      - expat_friendly
      - engineering_brand

    # Allowed values:
    # language_friction_high, overtime_risk,
    # reputation_risk, layoff_risk
    risk_tags:
      - overtime_risk
