# Optional per-persona tuning fields (both default to engine-level values if omitted):
#
# signal_weights:
#   Map of signal name → integer weight. Overrides the priority-based defaults for
#   the specified signals only. Positive signals use the weight as a score bonus;
#   risk signals use the weight as the full penalty (extra_penalty constants still
#   apply for unweighted risk signals). Examples:
#     signal_weights:
#       english_environment: 4     # prioritize English env more than default
#       onsite_bias: 5             # heavier penalty for onsite bias
#
# ranking_strategy:
#   Controls sort order within each digest section. Allowed values:
#     by_score          — normalized score DESC (default)
#     by_language_ease  — language_friction_index ASC, score DESC tiebreaker
#     by_reputation     — company_reputation_index DESC, score DESC tiebreaker
#     by_composite      — 2*score + (100-friction) + reputation DESC
#
# minimum_salary_yen:
#   Optional salary floor. Jobs below this threshold become riskier, not auto-rejected.

personas:

  - id: product_expat_engineer
    description: "Product-oriented expat engineer living in Japan"
    priorities:
      - english_environment
      - product_company
      - engineering_culture
      - hybrid_work
      - work_life_balance
      - salary
      - stability

    hard_no:
      - consulting_company
      - early_stage_startup

    acceptable_if:
      - hybrid_partial
      - japanese_not_blocking
      - stable_scaleup

  - id: product_expat_engineer_strict_stability
    description: "Product-oriented expat engineer with strict family/stability constraints in Japan"
    priorities:
      - english_environment
      - product_company
      - engineering_culture
      - hybrid_work
      - work_life_balance
      - salary
      - stability

    hard_no:
      - consulting_company
      - early_stage_startup
      - japanese_only_environment
      - workload_overload
      - forced_relocation

    acceptable_if:
      - hybrid_partial
      - japanese_not_blocking
      - stable_scaleup

  - id: product_expat_engineer_pragmatic
    description: "Product-oriented expat engineer optimizing for employability first, with consulting and onsite-only roles tolerated but penalized"
    priorities:
      - english_environment
      - product_company
      - engineering_culture
      - hybrid_work
      - work_life_balance
      - salary
      - stability

    hard_no:
      - early_stage_startup

    acceptable_if:
      - hybrid_partial
      - japanese_not_blocking
      - stable_scaleup

    minimum_salary_yen: 8000000
